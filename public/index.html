<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Колода Лжеца — Liar's Bar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login">
        <h1>🐍 КОЛОДА ЛЖЕЦА</h1>
        <h2>Liar's Bar</h2>
        <input type="text" id="playerName" placeholder="Введите ваше имя" autocomplete="off">
        <button id="joinBtn">🎲 Войти за стол</button>
    </div>
    <div id="game" style="display: none;">
        <div id="players"></div>
        <div id="gameInfo"></div>
        <div id="myHand"></div>
        <div id="actions"></div>
    </div>
    <script src="client.js"></script>
</body>
</html>
